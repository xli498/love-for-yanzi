<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 给燕子的专属小窝</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff6b9d;
    --pink-light: #ffa5c3;
    --pink-bg: #fff0f5;
    --rose: #e91e63;
    --lavender: #e8d5f5;
    --mint: #d4f5e9;
    --peach: #ffe5d9;
    --yellow: #fff3cd;
    --white: #ffffff;
    --text: #4a3347;
    --text-light: #8b7089;
    --shadow: 0 4px 20px rgba(233,30,99,0.12);
    --radius: 16px;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #fff0f5 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart {
    position: absolute;
    font-size: 20px;
    animation: floatHeart linear infinite;
    opacity: 0.4;
  }
  @keyframes floatHeart {
    0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-100px) rotate(360deg) scale(1); opacity: 0; }
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--rose);
    text-shadow: 0 2px 10px rgba(233,30,99,0.2);
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 14px;
    color: var(--text-light);
  }
  .header .date {
    font-size: 13px;
    color: var(--pink);
    margin-top: 8px;
    font-weight: 500;
  }

  /* Cards */
  .card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,107,157,0.15);
    transition: transform 0.2s;
  }
  .card:active { transform: scale(0.98); }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--rose);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 20px; }

  /* Sweet Message */
  .sweet-msg {
    text-align: center;
    padding: 16px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sweet-msg .msg-text {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    font-weight: 400;
  }
  .sweet-msg .msg-emoji {
    font-size: 24px;
    margin-top: 8px;
  }
  .next-msg-time {
    text-align: right;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 8px;
  }

  /* Weather */
  .weather-content {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .weather-icon { font-size: 48px; }
  .weather-info { flex: 1; }
  .weather-temp { font-size: 28px; font-weight: 700; color: var(--rose); }
  .weather-desc { font-size: 13px; color: var(--text-light); margin-top: 2px; }
  .weather-detail { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* Dressing Advice */
  .weather-advice {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    background: var(--mint);
    color: #2d6a4f;
  }
  .weather-advice.warm {
    background: #fff3cd;
    color: #856404;
  }
  .weather-advice.hot {
    background: #ffe5d9;
    color: #b85c38;
  }
  .weather-advice.cold {
    background: #e3f2fd;
    color: #1565c0;
  }
  .weather-advice.freezing {
    background: #e8eaf6;
    color: #283593;
  }

  .period-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .period-stat {
    text-align: center;
    flex: 1;
    min-width: 80px;
  }
  .period-stat .num {
    font-size: 32px;
    font-weight: 700;
    color: var(--rose);
  }
  .period-stat .label {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .period-bar {
    width: 100%;
    height: 8px;
    background: #fce4ec;
    border-radius: 4px;
    margin-top: 12px;
    overflow: hidden;
  }
  .period-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--rose));
    border-radius: 4px;
    transition: width 0.5s;
  }
  .period-tip {
    font-size: 12px;
    color: var(--pink);
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--pink-bg);
    border-radius: 8px;
    line-height: 1.6;
  }
  .period-settings {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed #f8bbd0;
  }
  .period-settings label {
    font-size: 12px;
    color: var(--text-light);
    display: block;
    margin-bottom: 6px;
  }
  .period-settings input {
    width: 80px;
    padding: 6px 10px;
    border: 1px solid #f8bbd0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    text-align: center;
  }
  .period-settings input:focus { border-color: var(--pink); }
  .period-settings .inline { display: flex; gap: 16px; margin-bottom: 8px; }

  /* Habit Tracker */
  .habit-list { list-style: none; }
  .habit-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #fce4ec;
    gap: 10px;
  }
  .habit-item:last-child { border-bottom: none; }
  .habit-check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--pink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .habit-check.done {
    background: var(--pink);
    border-color: var(--pink);
  }
  .habit-check.done::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }
  .habit-name { flex: 1; font-size: 14px; }
  .habit-name.done { text-decoration: line-through; color: var(--text-light); }
  .habit-streak { font-size: 11px; color: var(--pink); font-weight: 500; }
  .habit-msg {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--mint);
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    color: #2d6a4f;
  }
  .add-habit {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-habit input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #f8bbd0;
    border-radius: 10px;
    font-size: 13px;
    outline: none;
  }
  .add-habit input:focus { border-color: var(--pink); }
  .add-habit button {
    padding: 8px 14px;
    background: var(--pink);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
  }

  /* Todo */
  .todo-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .todo-input-wrap input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #f8bbd0;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
  }
  .todo-input-wrap input:focus { border-color: var(--pink); }
  .todo-input-wrap button {
    padding: 10px 16px;
    background: linear-gradient(135deg, var(--pink), var(--rose));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .todo-list { list-style: none; }
  .todo-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #fce4ec;
    gap: 10px;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--pink-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .todo-check.done {
    background: var(--mint);
    border-color: #52b788;
  }
  .todo-check.done::after { content: '✓'; color: #2d6a4f; font-size: 12px; font-weight: 700; }
  .todo-text { flex: 1; font-size: 14px; }
  .todo-text.done { text-decoration: line-through; color: var(--text-light); }
  .todo-del {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    background: #fce4ec;
    color: var(--pink);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .todo-item:hover .todo-del { opacity: 1; }

  /* Countdown */
  .countdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .countdown-item {
    text-align: center;
    padding: 12px;
    background: var(--pink-bg);
    border-radius: 12px;
  }
  .countdown-item .num {
    font-size: 24px;
    font-weight: 700;
    color: var(--rose);
  }
  .countdown-item .label {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 0;
    font-size: 12px;
    color: var(--pink-light);
  }
  .footer .heart { color: var(--rose); }

  /* Day selector */
  .day-selector {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .day-btn {
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid #f8bbd0;
    background: white;
    font-size: 11px;
    cursor: pointer;
    color: var(--text-light);
  }
  .day-btn.active {
    background: var(--pink);
    color: white;
    border-color: var(--pink);
  }

  /* Animations */
  .fade-in { animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .pulse { animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* Responsive */
  @media (max-width: 360px) {
    .header h1 { font-size: 24px; }
    .weather-icon { font-size: 36px; }
    .countdown-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.habitLog) d.habitLog = {};
      // 始终使用源代码中的最新设置，避免缓存覆盖
      d.counterStart = DEFAULT_DATA().counterStart;
      return d;
    }
  } catch(e) {}
  return DEFAULT_DATA();
}

function saveData(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e) {}
}

let data = loadData();

// ==================== Init ====================
function init() {
  updateHeaderDate();
  initSweetMsg();
  initWeather();
  initCountdown();
  initPeriod();
  initHabits();
  initTodos();
  createHearts();
}

// ==================== Header Date ====================
function updateHeaderDate() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  const d = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
  document.getElementById('headerDate').textContent = d;
}

// ==================== Sweet Message ====================
function initSweetMsg() {
  const today = new Date().toDateString();
  if (data.lastMsgDate !== today) {
    data.msgIndex = (data.msgIndex + 1) % SWEET_MSGS.length;
    data.lastMsgDate = today;
    saveData(data);
  }
  showSweetMsg();
  setInterval(showSweetMsg, 4 * 60 * 60 * 1000);
}

function showSweetMsg() {
  const msg = SWEET_MSGS[data.msgIndex % SWEET_MSGS.length];
  document.getElementById('sweetMsg').textContent = msg.text;
  document.getElementById('sweetEmoji').textContent = msg.emoji;
}

// ==================== Weather ====================
async function initWeather() {
  try {
    const resp = await fetch(`https://wttr.in/${encodeURIComponent(WEATHER_CITY)}?format=j1`);
    const j = await resp.json();
    const cur = j.current_condition[0];
    const temp = parseInt(cur.temp_C);
    const desc = cur.lang_zh && cur.lang_zh[0] ? cur.lang_zh[0].value : cur.weatherDesc[0].value;
    const humidity = cur.humidity;
    const wind = cur.windspeedKmph;
    const feelsLike = cur.FeelsLikeC;

    const weatherMap = {
      'Sunny': '☀️', 'Clear': '🌙', 'Partly cloudy': '⛅', 'Cloudy': '☁️',
      'Overcast': '🌥️', 'Mist': '🌫️', 'Fog': '🌫️', 'Light rain': '🌦️',
      'Moderate rain': '🌧️', 'Heavy rain': '⛈️', 'Light snow': '🌨️',
      'Moderate snow': '❄️', 'Heavy snow': '❄️', 'Thunderstorm': '⛈️',
      'Patchy rain possible': '🌦️', 'Light drizzle': '🌦️',
    };
    const icon = weatherMap[desc] || '🌤️';
    const zhDesc = desc.replace('Sunny','晴天').replace('Clear','晴朗')
      .replace('Partly cloudy','多云').replace('Cloudy','阴天')
      .replace('Overcast','阴天').replace('Mist','薄雾')
      .replace('Light rain','小雨').replace('Moderate rain','中雨')
      .replace('Heavy rain','大雨').replace('Light snow','小雪')
      .replace('Moderate snow','中雪').replace('Heavy snow','大雪')
      .replace('Thunderstorm','雷暴').replace('Light drizzle','毛毛雨')
      .replace('Patchy rain possible','可能有雨')
      .replace('Fog','大雾');

    document.getElementById('weatherIcon').textContent = icon;
    document.getElementById('weatherTemp').textContent = `${temp}°C`;
    document.getElementById('weatherDesc').textContent = `${WEATHER_CITY} · ${zhDesc}`;
    document.getElementById('weatherDetail').textContent = `体感${feelsLike}°C · 湿度${humidity}% · 风速${wind}km/h`;

    // ===== 穿衣建议 + 多喝热水 =====
    const adviceEl = document.getElementById('weatherAdvice');
    let advice = '';
    let adviceClass = '';

    if (temp >= 38) {
      advice = '🥵 极端高温预警！穿短袖短裤，非必要别出门，小心中暑！';
      adviceClass = 'hot';
    } else if (temp >= 33) {
      advice = '☀️ 太热了！穿短袖短裤，做好防晒，多喝水～';
      adviceClass = 'hot';
    } else if (temp >= 28) {
      advice = '🌤️ 有点热，穿短袖或薄裙子，注意防晒哦～';
      adviceClass = 'hot';
    } else if (temp >= 23) {
      advice = '🌸 温度刚刚好，穿件短袖或连衣裙就很好看～';
      adviceClass = 'warm';
    } else if (temp >= 18) {
      advice = '🍃 微风不燥，穿长袖或薄外套，舒服～';
    } else if (temp >= 13) {
      advice = '🌬️ 凉凉的，穿件外套或薄毛衣，别着凉了～';
      adviceClass = 'cold';
    } else if (temp >= 8) {
      advice = '🧥 天气转冷了，出门记得穿厚外套！';
      adviceClass = 'cold';
    } else if (temp >= 3) {
      advice = '❄️ 冷！羽绒服裹紧，围巾安排上！';
      adviceClass = 'freezing';
    } else {
      advice = '⛄ 极寒！羽绒服+围巾+手套+帽子全副武装！';
      adviceClass = 'freezing';
    }

    // 天冷多喝热水（低于22°C）
    if (temp < 22) {
      advice += ' 🍵 天冷多喝热水，暖身暖心～';
    }

    adviceEl.textContent = advice;
    adviceEl.className = 'weather-advice' + (adviceClass ? ' ' + adviceClass : '');
  } catch(e) {
    document.getElementById('weatherDesc').textContent = '天气获取失败，但我的爱不会～';
  }
}

// ==================== Countdown ====================
function initCountdown() {
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const start = new Date(data.counterStart).getTime();
  const now = new Date().getTime();
  const diff = Math.max(0, now - start);
  const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
  const totalWeeks = Math.floor(totalDays / 7);
  const totalHours = Math.floor(diff / (1000 * 60 * 60));
  const totalMins = Math.floor(diff / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById('countdownGrid').innerHTML = `
    <div class="countdown-item"><div class="num">${totalDays}</div><div class="label">在一起的天数</div></div>
    <div class="countdown-item"><div class="num">${totalWeeks}</div><div class="label">累计周数</div></div>
    <div class="countdown-item"><div class="num">${totalHours}</div><div class="label">累计小时数</div></div>
    <div class="countdown-item"><div class="num">${totalMins}</div><div class="label">累计分钟数</div></div>
    <div class="countdown-item"><div class="num">${secs}</div><div class="label">秒</div></div>
  `;
}

// ==================== Period Tracker ====================
function initPeriod() {
  const saved = localStorage.getItem('yanzi_period_lastDate');
  const savedCycle = localStorage.getItem('yanzi_period_cycleLen');
  const savedDuration = localStorage.getItem('yanzi_period_duration');
  if (saved) data.periodLastDate = saved;
  if (savedCycle) data.periodCycleLen = parseInt(savedCycle);
  if (savedDuration) data.periodDuration = parseInt(savedDuration);

  if (data.periodLastDate) document.getElementById('periodLastDate').value = data.periodLastDate;
  if (data.periodCycleLen) document.getElementById('periodCycleLenInput').value = data.periodCycleLen;
  if (data.periodDuration) document.getElementById('periodDurationInput').value = data.periodDuration;

  updatePeriod();
  // Recalculate periodically
  setInterval(updatePeriod, 60000);
}

function updatePeriod() {
  if (!data.periodLastDate || !data.periodCycleLen) {
    document.getElementById('periodDaysLeft').textContent = '--';
    document.getElementById('periodCycleDay').textContent = '--';
    document.getElementById('periodTip').textContent = '请在上方设置上次经期日期～';
    document.getElementById('periodBar').style.width = '0%';
    return;
  }

  const last = new Date(data.periodLastDate);
  const now = new Date();
  const cycleLen = data.periodCycleLen;
  const duration = data.periodDuration || 5;

  const daysSinceLast = Math.round((now - last) / (1000 * 60 * 60 * 24));
  const cycleDay = (daysSinceLast % cycleLen) + 1;

  // Next period expected
  const daysToNext = cycleLen - (daysSinceLast % cycleLen);
  document.getElementById('periodDaysLeft').textContent = daysToNext;

  const currentCycle = Math.floor(daysSinceLast / cycleLen) + 1;
  document.getElementById('periodCycleDay').textContent = cycleDay;

  const barPct = Math.min(100, (cycleDay / cycleLen) * 100);
  document.getElementById('periodBar').style.width = barPct + '%';

  // Tip
  let tip = '';
  const inPeriod = cycleDay <= duration;
  const daysToPeriod = daysToNext;
  if (inPeriod) {
    tip = '🌸 经期期间，注意保暖，多喝红糖水，好好休息哦～燕子辛苦了！';
  } else if (daysToPeriod <= 2) {
    tip = '⚠️ 经期快到了，提前准备哦～可能会有不舒服，记得照顾好自己！';
  } else if (cycleDay > 14 && cycleDay <= 17) {
    tip = '💕 排卵期前后，注意休息，保持好心情～';
  } else {
    tip = '🌿 最近状态不错，继续保持良好的作息和心情哦～';
  }
  document.getElementById('periodTip').textContent = tip;
}

function savePeriod() {
  data.periodLastDate = document.getElementById('periodLastDate').value;
  data.periodCycleLen = parseInt(document.getElementById('periodCycleLenInput').value) || 28;
  data.periodDuration = parseInt(document.getElementById('periodDurationInput').value) || 5;
  localStorage.setItem('yanzi_period_lastDate', data.periodLastDate);
  localStorage.setItem('yanzi_period_cycleLen', data.periodCycleLen);
  localStorage.setItem('yanzi_period_duration', data.periodDuration);
  alert('✅ 保存成功！');
  updatePeriod();
}

// ==================== Habits ====================
let currentHabitDate = new Date().toISOString().slice(0,10);

function initHabits() {
  renderDaySelector();
  renderHabits();
}

function renderDaySelector() {
  const sel = document.getElementById('daySelector');
  const today = new Date().toISOString().slice(0,10);
  sel.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const key = d.toISOString().slice(0,10);
    const dayNames = ['日','一','二','三','四','五','六'];
    const label = key === today ? '今天' : `${d.getDate()}日`;
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (key === currentHabitDate ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { currentHabitDate = key; renderDaySelector(); renderHabits(); };
    sel.appendChild(btn);
  }
}

function renderHabits() {
  const list = document.getElementById('habitList');
  const log = data.habitLog[currentHabitDate] || {};

  list.innerHTML = data.habits.map(h => {
    const done = !!log[h.id];
    return `
      <li class="habit-item">
        <div class="habit-check${done ? ' done' : ''}" onclick="toggleHabit(${h.id})"></div>
        <span class="habit-name${done ? ' done' : ''}">${h.icon} ${h.name}</span>
      </li>
    `;
  }).join('');

  const doneCount = data.habits.filter(h => log[h.id]).length;
  const total = data.habits.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;
  let msg = '';
  if (currentHabitDate !== new Date().toISOString().slice(0,10)) {
    msg = `📋 历史记录查看`;
  } else if (pct === 100) {
    msg = '🎉 太棒了！今天全部完成！燕子最厉害了！奖励你一个大大的亲亲～';
  } else if (pct >= 60) {
    msg = `👍 已完成 ${doneCount}/${total}，继续加油！你可以的～`;
  } else if (pct > 0) {
    msg = `💪 完成了 ${doneCount}/${total}，还差一点点，冲鸭！`;
  } else {
    msg = '🌸 新的一天开始了，从第一个小习惯开始吧～';
  }
  document.getElementById('habitMsg').textContent = msg;
}

function toggleHabit(id) {
  if (!data.habitLog[currentHabitDate]) data.habitLog[currentHabitDate] = {};
  data.habitLog[currentHabitDate][id] = !data.habitLog[currentHabitDate][id];
  saveData(data);
  renderHabits();
}

function addHabit() {
  const input = document.getElementById('newHabitInput');
  const name = input.value.trim();
  if (!name) return;
  const id = Date.now();
  const icons = ['🌟','💪','🎯','✨','💖','🌈','⭐','🎵','📚','🧘'];
  const icon = icons[Math.floor(Math.random() * icons.length)];
  data.habits.push({ id, name, icon });
  saveData(data);
  input.value = '';
  renderHabits();
}

// ==================== Todos ====================
function initTodos() {
  renderTodos();
  document.getElementById('todoInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTodo();
  });
}

function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  data.todos.unshift({ id: Date.now(), text, done: false });
  saveData(data);
  input.value = '';
  renderTodos();
}

function toggleTodo(id) {
  const todo = data.todos.find(t => t.id === id);
  if (todo) todo.done = !todo.done;
  saveData(data);
  renderTodos();
}

function delTodo(id) {
  data.todos = data.todos.filter(t => t.id !== id);
  saveData(data);
  renderTodos();
}

function renderTodos() {
  const list = document.getElementById('todoList');
  if (data.todos.length === 0) {
    list.innerHTML = '<li style="text-align:center;color:var(--text-light);font-size:13px;padding:16px;">暂无待办，好轻松～ 🎉</li>';
    return;
  }
  list.innerHTML = data.todos.map(t => `
    <li class="todo-item">
      <div class="todo-check${t.done ? ' done' : ''}" onclick="toggleTodo(${t.id})"></div>
      <span class="todo-text${t.done ? ' done' : ''}">${t.text}</span>
      <button class="todo-del" onclick="delTodo(${t.id})">×</button>
    </li>
  `).join('');
}

// ==================== Floating Hearts ====================
function createHearts() {
  const bg = document.getElementById('heartsBg');
  const hearts = ['💕','💖','💗','💝','🩷','🌸','✨','⭐'];
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (14 + Math.random() * 16) + 'px';
    heart.style.animationDuration = (8 + Math.random() * 12) + 's';
    heart.style.animationDelay = Math.random() * 10 + 's';
    bg.appendChild(heart);
  }
}

// ==================== Keyboard shortcuts ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.id === 'newHabitInput') {
    addHabit();
  }
});

// ==================== Start ====================
init();
</script>
